name: Issue → Git Event Log

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  issue_to_git:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract issue data safely
        id: issue
        run: |
          jq . "$GITHUB_EVENT_PATH" > event.json

          ISSUE_NUMBER=$(jq -r .issue.number event.json)
          ISSUE_TITLE=$(jq -r .issue.title event.json)
          ISSUE_BODY=$(jq -r .issue.body event.json)
          ISSUE_USER=$(jq -r .issue.user.login event.json)

          echo "NUMBER=$ISSUE_NUMBER" >> $GITHUB_ENV
          echo "TITLE=$ISSUE_TITLE" >> $GITHUB_ENV
          echo "AUTHOR=$ISSUE_USER" >> $GITHUB_ENV

          echo "$ISSUE_BODY" > issue_body.txt

      - name: Configure git
        run: |
          git config user.name "issue-bot"
          git config user.email "issue-bot@users.noreply.github.com"

      - name: Create branch for issue
        run: |
          BRANCH="issue/${NUMBER}"
          git checkout -b $BRANCH

      - name: Generate commit message
        run: |
          cat <<EOF > commit_message.txt
issue(#${NUMBER}): ${TITLE}

Author: ${AUTHOR}

---
Issue link: https://github.com/${{ github.repository }}/issues/${NUMBER}

Body:
$(cat issue_body.txt)
EOF

      - name: Create issue event file
        run: |
          mkdir -p issues-log

          FILE="issues-log/issue-${NUMBER}.md"

          cat <<EOF > $FILE
# Issue ${NUMBER}

Title: ${TITLE}

Author: ${AUTHOR}

---

$(cat issue_body.txt)
EOF

          git add $FILE

      - name: Commit changes
        run: |
          git commit -F commit_message.txt

      - name: Push branch
        run: |
          git push origin HEAD

      - name: Close issue
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${NUMBER} \
            -d '{"state":"closed","state_reason":"completed"}'
